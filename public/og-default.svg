<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="There & Back Again — A literary travel chronicle">
  <rect width="1200" height="630" fill="#0a0f08"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#7db05a" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- top ornament -->
  <g fill="none" stroke="#7db05a" stroke-opacity="0.55" stroke-width="1.5">
    <line x1="500" y1="196" x2="566" y2="196"/>
    <line x1="634" y1="196" x2="700" y2="196"/>
  </g>
  <circle cx="600" cy="196" r="3.5" fill="#7db05a"/>

  <text x="600" y="170" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" letter-spacing="7" fill="#7db05a"
        style="text-transform:uppercase">A SOLO TRAVEL CHRONICLE</text>

  <text x="600" y="350" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="104" fill="#dde8d0">There <tspan font-style="italic" fill="#9ecf72">&amp; Back</tspan> Again</text>

  <text x="600" y="446" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-style="italic" fill="#dde8d0" fill-opacity="0.7">A literary travel chronicle</text>

  <!-- bottom ornament -->
  <g fill="none" stroke="#7db05a" stroke-opacity="0.45" stroke-width="1.5">
    <line x1="528" y1="506" x2="588" y2="506"/>
    <line x1="612" y1="506" x2="672" y2="506"/>
  </g>
  <circle cx="600" cy="506" r="3" fill="#7db05a" fill-opacity="0.8"/>
</svg>
